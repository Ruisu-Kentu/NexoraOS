<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexoraOS — Boot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Michroma', sans-serif;
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== PARTICLES ===== */
    #particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(167, 139, 250, 0.6);
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ===== YOUR ANIMATION ===== */
    .loading-page {
      position: fixed;
      top: 0; left: 0;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 25%, #0f1929 50%, #1a0f2e 75%, #0a0e27 100%);
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #svg {
      height: 150px;
      width: 150px;
      stroke: white;
      fill-opacity: 0;
      stroke-width: 3px;
      stroke-dasharray: 4500;
      animation: draw 3s ease forwards;
    }

    @keyframes draw {
      0%   { stroke-dashoffset: 4500; }
      100% { stroke-dashoffset: 0; }
    }

    .name-container {
      height: 30px;
      overflow: hidden;
    }

    .logo-name {
      color: white;
      font-size: 20px;
      letter-spacing: 12px;
      margin-left: 20px;
    }

    /* ===== LOGIN SCREEN ===== */
    #login-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    #login-screen.show {
      opacity: 1;
      pointer-events: all;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 20px;
      padding: 40px;
      width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(124,58,237,0.1);
    }

    .login-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1f275c 0%, #1a1f3a 25%, #43659c 50%, #1a0f2e 75%, #202a6e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 20px rgba(167,139,250,0.4);
    }

    .login-card h2 {
      color: white;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    .login-card h2 span {
      color: #a78bfa;
    }

    .login-fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      outline: none;
      font-family: 'Michroma', sans-serif;
      transition: border 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }

    .login-input::placeholder { color: #555; }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1f275c 0%, #1a1f3a 25%, #43659c 50%, #1a0f2e 75%, #202a6e 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      font-family: 'Michroma', sans-serif;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .login-btn:active { transform: translateY(0); }

    #login-error {
      color: #fca5a5;
      font-size: 12px;
      min-height: 18px;
      text-align: center;
    }

    .login-version {
      color: white;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-10px); }
      40%       { transform: translateX(10px); }
      60%       { transform: translateX(-8px); }
      80%       { transform: translateX(8px); }
    }

    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

  <!-- PARTICLES (always visible in background) -->
  <div id="particles"></div>

  <!-- YOUR ANIMATION -->
  <div class="loading-page">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
      <path d="M479.8 576L384.7 576L276.5 421.5L276.5 512.6L190.1 576L92.4 576L92.4 93.8L132.9 64L240.9 64L364.6 240.1L364.6 
      127.4L451 64L548.7 64L548.7 525.5L479.8 576zM103.2 99.3L103.2 560L175.2 507.1L175.2 258L390.7 565.6L475.5 565.6L527.9 
      527.4L449.6 527.4L133.5 76.9L103.3 99.2zM185.7 565.9L265.7 507.1L265.7 406.1L185.9 291.7L185.9 512.6L113.3 565.9L185.6
      565.9L185.6 565.9zM145 74.8L455.6 517.4L538 517.4L538 74.8L458.2 74.8L458.2 392.4L235.3 74.8L145 74.8zM375.4 255.6L447.4 
      358.4L447.4 79.9L375.4 132.9L375.4 255.6z"/>
    </svg>
    <div class="name-container">
      <div class="logo-name">NexoraOS</div>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-avatar"></div>
      <h2>Welcome to <span>Nexora</span></h2>
      <div class="login-fields">
        <input type="text" id="username" class="login-input"
          placeholder="Username" autocomplete="off"/>
        <input type="password" id="password" class="login-input"
          placeholder="Password"
          onkeydown="if(event.key==='Enter') attemptLogin()"/>
      </div>
      <div id="login-error"></div>
      <button class="login-btn" onclick="attemptLogin()">Sign In</button>
      <div class="login-version">NexoraOS v1.0</div>
    </div>
  </div>

  <script src="assets/js/lucide.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
    integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    // ===== PARTICLES =====
    function createParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 3 + 1;
        p.style.cssText = `
          width: ${size}px;
          height: ${size}px;
          left: ${Math.random() * 100}%;
          animation-duration: ${Math.random() * 10 + 8}s;
          animation-delay: ${Math.random() * 8}s;
          opacity: ${Math.random() * 0.5 + 0.2};
        `;
        container.appendChild(p);
      }
    }
    createParticles();

    // ===== YOUR GSAP ANIMATIONS =====
    // Logo name slides up
    gsap.fromTo('.logo-name', {
      y: 50,
      opacity: 0,
    }, {
      y: 0,
      opacity: 1,
      duration: 2,
      delay: 0.5,
    });

    // Loading page fades out, then login appears
    gsap.fromTo('.loading-page', {
      opacity: 1,
    }, {
      opacity: 0,
      duration: 1.5,
      delay: 3.5,
      onComplete: () => {
        document.querySelector('.loading-page').style.pointerEvents = 'none';
        document.querySelector('.loading-page').style.display = 'none';
        const loginScreen = document.getElementById('login-screen');
        loginScreen.classList.add('show');
        document.getElementById('username').focus();
      }
    });

    // ===== LOGIN =====
    function attemptLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('login-error');
      const card     = document.querySelector('.login-card');

      if (!username || !password) {
        errorEl.textContent = 'Please enter both username and password.';
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');
        return;
      }

      errorEl.textContent = '';

      fetch('/NexoraOs/api/login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            document.body.style.transition = 'opacity 0.6s ease';
            document.body.style.opacity    = '0';
            setTimeout(() => {
              window.location.href = '/NexoraOs/index.html';
            }, 600);
          } else {
            errorEl.textContent = data.error || 'Login failed.';
            card.classList.remove('shake');
            void card.offsetWidth;
            card.classList.add('shake');
            document.getElementById('password').value = '';
          }
        })
        .catch(() => {
          errorEl.textContent = 'Connection error. Please try again.';
        });
    }
  </script>

</body>
</html>
